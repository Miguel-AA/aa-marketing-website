<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A&A Marketing</title>

  <style>
    html {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #061A3A;
      color: #fff;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow-x: hidden;
    }

    a {
      color: inherit;
    }

    main > section {
      scroll-margin-top: 128px;
    }

    button,
    input,
    textarea {
      font: inherit;
    }
  </style>
</head>

<body>
  <main id="aa-page"></main>

  <script>
    (async function () {
      const sections = [
        'header',
        'hero',
        'services',
        'who',
        'clients',
        'partners',
        'team',
        'facts',
        'contact',
        'footer'
      ];

      const mount = document.getElementById('aa-page');

      async function loadSection(sectionName) {
        const response = await fetch('./' + sectionName + '?v=' + Date.now(), { cache: 'no-store' });

        if (!response.ok) {
          throw new Error('Could not load section: ' + sectionName);
        }

        const html = await response.text();

        const wrapper = document.createElement('div');
        wrapper.innerHTML = html;

        /*
          Important:
          Scripts inserted through innerHTML do not run automatically.
          This recreates each script so your sliders, accordions,
          videos, contact form, etc. continue working.
        */
        const scripts = wrapper.querySelectorAll('script');

        scripts.forEach(function (oldScript) {
          const newScript = document.createElement('script');

          Array.from(oldScript.attributes).forEach(function (attr) {
            newScript.setAttribute(attr.name, attr.value);
          });

          newScript.textContent = oldScript.textContent;
          oldScript.replaceWith(newScript);
        });

        while (wrapper.firstChild) {
          mount.appendChild(wrapper.firstChild);
        }
      }

      for (const section of sections) {
        try {
          await loadSection(section);
        } catch (error) {
          console.error(error);

          const errorBlock = document.createElement('section');
          errorBlock.style.padding = '40px';
          errorBlock.style.color = '#fff';
          errorBlock.style.background = '#8B0000';
          errorBlock.innerHTML = '<strong>Error loading:</strong> ' + section;

          mount.appendChild(errorBlock);
        }
      }

      function scrollToCurrentHash() {
        if (!window.location.hash) return;
        const target = document.querySelector(window.location.hash);
        if (target) {
          target.scrollIntoView({ block: 'start' });
        }
      }

      requestAnimationFrame(scrollToCurrentHash);
      setTimeout(scrollToCurrentHash, 250);
      setTimeout(scrollToCurrentHash, 900);
      window.addEventListener('hashchange', function () {
        requestAnimationFrame(scrollToCurrentHash);
      });
    })();
  </script>
</body>
</html>
